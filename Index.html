<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahayog Hospitals | A Legacy of Trust, Built on Compassion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0A2342;
    --navy-light: #1A3A5C;
    --teal: #0D7C66;
    --teal-light: #12A688;
    --gold: #C9962A;
    --gold-light: #E8B84B;
    --cream: #F7F4EE;
    --white: #FFFFFF;
    --gray-50: #F8F9FA;
    --gray-100: #F1F3F5;
    --gray-200: #E9ECEF;
    --gray-400: #ADB5BD;
    --gray-600: #6C757D;
    --gray-800: #343A40;
    --text: #1A1F2E;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --shadow-sm: 0 2px 8px rgba(10,35,66,0.08);
    --shadow-md: 0 4px 20px rgba(10,35,66,0.12);
    --shadow-lg: 0 8px 40px rgba(10,35,66,0.16);
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-body); color: var(--text); background: var(--white); overflow-x: hidden; }

  /* ─── TOP BAR ─── */
  .topbar {
    background: var(--navy);
    color: rgba(255,255,255,0.75);
    font-size: 12.5px;
    padding: 8px 0;
  }
  .topbar-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .topbar a { color: rgba(255,255,255,0.75); text-decoration: none; transition: color .2s; }
  .topbar a:hover { color: var(--gold-light); }
  .topbar-left { display: flex; gap: 24px; }
  .topbar-right { display: flex; gap: 20px; align-items: center; }
  .topbar-divider { color: rgba(255,255,255,0.2); }

  /* ─── NAV ─── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    box-shadow: var(--shadow-sm);
  }
  .nav-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
  }
  .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .logo-mark {
    width: 44px; height: 44px;
    background: var(--navy);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: 22px;
    color: var(--gold-light);
    font-weight: 700;
    letter-spacing: -1px;
  }
  .logo-text { display: flex; flex-direction: column; }
  .logo-name {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.1;
    letter-spacing: -0.3px;
  }
  .logo-tagline {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--teal);
    text-transform: uppercase;
    font-weight: 500;
  }
  .nav-links { display: flex; align-items: center; gap: 4px; }
  .nav-links a {
    text-decoration: none;
    color: var(--gray-800);
    font-size: 14px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 8px;
    transition: all .2s;
    position: relative;
  }
  .nav-links a:hover { color: var(--navy); background: var(--gray-50); }
  .nav-links .dropdown { position: relative; }
  .nav-links .dropdown > a::after { content: ' ▾'; font-size: 10px; }
  .dropdown-menu {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 12px;
    box-shadow: var(--shadow-lg);
    min-width: 240px;
    padding: 8px 0;
    z-index: 200;
  }
  .dropdown:hover .dropdown-menu { display: block; }
  .dropdown-menu a {
    display: block;
    padding: 10px 20px;
    border-radius: 0;
    font-size: 13.5px;
    color: var(--gray-800);
  }
  .dropdown-menu a:hover { background: var(--gray-50); color: var(--teal); padding-left: 24px; }
  .nav-cta {
    background: var(--teal) !important;
    color: var(--white) !important;
    padding: 10px 22px !important;
    border-radius: 8px !important;
    font-weight: 600 !important;
    font-size: 13.5px !important;
    letter-spacing: 0.2px;
    transition: background .2s !important;
  }
  .nav-cta:hover { background: var(--teal-light) !important; }
  .emergency-btn {
    background: var(--gold) !important;
    color: var(--white) !important;
    padding: 10px 18px !important;
    border-radius: 8px !important;
    font-weight: 600 !important;
    font-size: 13px !important;
  }
  .emergency-btn:hover { background: var(--gold-light) !important; }

  /* ─── HERO ─── */
  .hero {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 50%, #1E4D6B 100%);
    min-height: 88vh;
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='1' fill='rgba(255,255,255,0.04)'/%3E%3C/svg%3E");
    opacity: 0.5;
  }
  .hero-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 80px 32px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(201,150,42,0.2);
    border: 1px solid rgba(201,150,42,0.4);
    color: var(--gold-light);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 28px;
  }
  .hero-badge span { width: 6px; height: 6px; background: var(--gold-light); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(38px, 4vw, 58px);
    font-weight: 700;
    color: var(--white);
    line-height: 1.15;
    letter-spacing: -0.5px;
    margin-bottom: 24px;
  }
  .hero h1 em { font-style: normal; color: var(--gold-light); }
  .hero p {
    font-size: 17px;
    color: rgba(255,255,255,0.7);
    line-height: 1.75;
    margin-bottom: 40px;
    max-width: 500px;
  }
  .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--teal);
    color: var(--white);
    padding: 14px 28px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 15px;
    text-decoration: none;
    transition: all .2s;
    border: 2px solid transparent;
  }
  .btn-primary:hover { background: var(--teal-light); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(13,124,102,0.3); }
  .btn-outline {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    color: var(--white);
    padding: 14px 28px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 15px;
    text-decoration: none;
    border: 2px solid rgba(255,255,255,0.3);
    transition: all .2s;
  }
  .btn-outline:hover { border-color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.08); }
  .hero-stats {
    display: flex;
    gap: 32px;
    margin-top: 48px;
    padding-top: 40px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .hero-stat .num {
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 700;
    color: var(--gold-light);
    line-height: 1;
  }
  .hero-stat .lbl { font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 4px; }
  .hero-right { position: relative; }
  .hero-cards { display: grid; grid-template-rows: auto auto; gap: 20px; }
  .hero-quick-card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 24px 28px;
    backdrop-filter: blur(12px);
    color: var(--white);
    transition: all .3s;
    cursor: pointer;
    text-decoration: none;
    display: block;
  }
  .hero-quick-card:hover { background: rgba(255,255,255,0.12); transform: translateY(-2px); }
  .hero-quick-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--white); }
  .hero-quick-card p { font-size: 13.5px; color: rgba(255,255,255,0.6); }
  .hero-quick-card .card-icon { font-size: 28px; margin-bottom: 14px; }
  .hero-cards-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* ─── QUICK ACCESS BAR ─── */
  .quick-bar {
    background: var(--white);
    box-shadow: var(--shadow-md);
    position: relative;
    z-index: 10;
  }
  .quick-bar-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
  }
  .quick-item {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 24px;
    text-decoration: none;
    color: var(--text);
    border-right: 1px solid var(--gray-200);
    transition: all .2s;
  }
  .quick-item:last-child { border-right: none; }
  .quick-item:hover { background: var(--gray-50); color: var(--teal); }
  .quick-icon {
    width: 44px; height: 44px;
    background: var(--gray-100);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    transition: background .2s;
  }
  .quick-item:hover .quick-icon { background: rgba(13,124,102,0.1); }
  .quick-text strong { display: block; font-size: 14px; font-weight: 600; }
  .quick-text span { font-size: 12px; color: var(--gray-600); }

  /* ─── SECTION COMMON ─── */
  .section { padding: 96px 0; }
  .section-alt { background: var(--cream); }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 16px;
  }
  .section-label::before { content: ''; display: block; width: 24px; height: 2px; background: var(--teal); }
  .section-title {
    font-family: var(--font-display);
    font-size: clamp(30px, 3vw, 44px);
    font-weight: 700;
    color: var(--navy);
    line-height: 1.2;
    letter-spacing: -0.3px;
    margin-bottom: 16px;
  }
  .section-desc { font-size: 16px; color: var(--gray-600); line-height: 1.75; max-width: 560px; }
  .section-header { margin-bottom: 56px; }
  .section-header-row { display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; flex-wrap: wrap; }
  .view-all {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--teal); font-weight: 600; font-size: 14px;
    text-decoration: none; border-bottom: 1.5px solid transparent;
    transition: border-color .2s;
    white-space: nowrap;
  }
  .view-all:hover { border-bottom-color: var(--teal); }

  /* ─── ABOUT ─── */
  .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
  .about-visual {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    background: linear-gradient(135deg, var(--navy) 0%, #1E5C8A 100%);
    min-height: 480px;
    display: flex; align-items: center; justify-content: center;
  }
  .about-visual-graphic {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 32px;
    width: 100%;
  }
  .av-card {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    color: var(--white);
  }
  .av-card .num { font-family: var(--font-display); font-size: 32px; font-weight: 700; color: var(--gold-light); }
  .av-card .lbl { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 4px; }
  .av-highlight {
    grid-column: span 2;
    background: rgba(13,124,102,0.2);
    border-color: rgba(13,124,102,0.4);
  }
  .about-content .section-label { margin-top: 0; }
  .about-pillars { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
  .pillar {
    display: flex; gap: 14px;
    padding: 20px;
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 12px;
    transition: box-shadow .2s;
  }
  .pillar:hover { box-shadow: var(--shadow-md); }
  .pillar-icon { font-size: 24px; flex-shrink: 0; margin-top: 2px; }
  .pillar strong { display: block; font-size: 14px; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
  .pillar p { font-size: 13px; color: var(--gray-600); line-height: 1.55; }

  /* ─── SPECIALTIES ─── */
  .spec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
  .spec-card {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 14px;
    padding: 28px 22px;
    text-align: center;
    text-decoration: none;
    color: var(--text);
    transition: all .25s;
    cursor: pointer;
  }
  .spec-card:hover { border-color: var(--teal); box-shadow: 0 6px 24px rgba(13,124,102,0.12); transform: translateY(-3px); }
  .spec-icon { font-size: 36px; margin-bottom: 14px; display: block; }
  .spec-card h3 { font-size: 14px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
  .spec-card p { font-size: 12px; color: var(--gray-600); line-height: 1.5; }

  /* ─── HOSPITALS ─── */
  .hosp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
  .hosp-card {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 20px;
    overflow: hidden;
    transition: box-shadow .3s, transform .3s;
  }
  .hosp-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-4px); }
  .hosp-header {
    background: linear-gradient(135deg, var(--navy), var(--navy-light));
    padding: 36px 28px;
    position: relative;
  }
  .hosp-city {
    display: inline-block;
    background: rgba(201,150,42,0.25);
    border: 1px solid rgba(201,150,42,0.4);
    color: var(--gold-light);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .hosp-header h3 { font-family: var(--font-display); font-size: 22px; color: var(--white); font-weight: 600; }
  .hosp-state { font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 4px; }
  .hosp-body { padding: 28px; }
  .hosp-addr { font-size: 13.5px; color: var(--gray-600); line-height: 1.6; margin-bottom: 20px; padding-left: 18px; border-left: 3px solid var(--teal); }
  .hosp-contact { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .hosp-contact a { font-size: 14px; color: var(--navy); text-decoration: none; font-weight: 500; }
  .hosp-contact a:hover { color: var(--teal); }
  .hosp-actions { display: flex; gap: 10px; }
  .btn-sm {
    flex: 1;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    transition: all .2s;
  }
  .btn-sm-primary { background: var(--teal); color: var(--white); }
  .btn-sm-primary:hover { background: var(--teal-light); }
  .btn-sm-outline { border: 1.5px solid var(--gray-200); color: var(--navy); }
  .btn-sm-outline:hover { border-color: var(--teal); color: var(--teal); }

  /* ─── DOCTORS ─── */
  .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 24px; }
  .doc-card {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 16px;
    overflow: hidden;
    transition: all .25s;
    text-decoration: none;
    color: var(--text);
  }
  .doc-card:hover { box-shadow: var(--shadow-md); transform: translateY(-3px); }
  .doc-photo {
    height: 200px;
    background: linear-gradient(150deg, #E8EEF5 0%, #D0DCED 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 56px;
    position: relative;
  }
  .doc-photo .doc-initials {
    width: 80px; height: 80px;
    background: var(--navy);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: 26px;
    color: var(--gold-light);
    font-weight: 700;
  }
  .doc-info { padding: 20px; }
  .doc-specialty {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--teal);
    background: rgba(13,124,102,0.08);
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .doc-info h3 { font-size: 15px; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
  .doc-info .qual { font-size: 12px; color: var(--gray-600); }
  .doc-info .location { font-size: 12px; color: var(--gray-400); margin-top: 8px; }

  /* ─── TESTIMONIALS ─── */
  .test-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
  .test-card {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 16px;
    padding: 32px;
    position: relative;
    transition: box-shadow .25s;
  }
  .test-card:hover { box-shadow: var(--shadow-md); }
  .test-quote { font-size: 52px; line-height: 0.7; color: var(--teal); font-family: var(--font-display); font-weight: 700; margin-bottom: 16px; opacity: 0.3; }
  .test-text { font-size: 14.5px; color: var(--gray-800); line-height: 1.75; margin-bottom: 24px; }
  .test-patient { display: flex; align-items: center; gap: 12px; }
  .test-avatar {
    width: 44px; height: 44px;
    background: var(--navy);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    color: var(--gold-light);
    font-weight: 700;
    font-family: var(--font-display);
    flex-shrink: 0;
  }
  .test-patient strong { display: block; font-size: 14px; font-weight: 600; color: var(--navy); }
  .test-patient span { font-size: 12px; color: var(--gray-600); }
  .test-stars { color: var(--gold); font-size: 13px; margin-bottom: 4px; }
  .test-video-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(13,124,102,0.08);
    color: var(--teal);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    margin-top: 12px;
    text-decoration: none;
  }
  .test-video-badge:hover { background: rgba(13,124,102,0.15); }

  /* ─── BLOGS ─── */
  .blog-grid { display: grid; grid-template-columns: 1.6fr 1fr 1fr; gap: 28px; align-items: start; }
  .blog-featured {
    background: var(--white);
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--gray-200);
    transition: box-shadow .25s;
    text-decoration: none;
    color: var(--text);
    display: block;
  }
  .blog-featured:hover { box-shadow: var(--shadow-md); }
  .blog-img {
    height: 240px;
    background: linear-gradient(135deg, #E8EEF5, #D0DCED);
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
  }
  .blog-featured-img { height: 280px; }
  .blog-content { padding: 24px; }
  .blog-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--teal);
    background: rgba(13,124,102,0.08);
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .blog-content h3 { font-family: var(--font-display); font-size: 18px; font-weight: 600; color: var(--navy); line-height: 1.4; margin-bottom: 10px; }
  .blog-content p { font-size: 13.5px; color: var(--gray-600); line-height: 1.6; }
